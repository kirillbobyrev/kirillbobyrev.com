baseURL = 'https://kirillbobyrev.com/'
enableEmoji = true
enableRobotsTXT = true
locale = 'en-US'
title = 'Kirill Bobyrev'
disableKinds = ['taxonomy', 'term']
enableGitInfo = true

[params]
  description = 'software engineering blog by Kirill Bobyrev'
  images = ['images/og.jpg']
  [params.author]
    name = 'kirill bobyrev'
  [params.social]
    twitter = 'kirillbobyrev'
    github = 'kirillbobyrev'
    linkedin = 'kirillbobyrev'
    instagram = 'cybobyrev'

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    noClasses = false
    tabWidth = 2
    style = 'github'
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

[services]
  [services.googleAnalytics]
    id = 'G-RHCZGDQQJR'

[[menus.main]]
  name = 'Resume'
  url = '/resume.pdf'
  weight = 2

[sitemap]
  changefreq = 'weekly'
