# Places for the /travel map. One table per place; the map dots, the
# visited-country tint, the stats line, and the by-country list all
# render from this file. `country` should be the common English name
# (Natural Earth naming; assets/js/travel.js has an alias map for the
# few that differ, e.g. United States). `when` is free-form and
# optional ('2023', '2019—', 'every summer').

[[places]]
  city = 'Miami'
  country = 'United States'
  lat = 25.7617
  lon = -80.1918
  when = '2026'

[[places]]
  city = 'Los Angeles'
  country = 'United States'
  lat = 34.0522
  lon = -118.2437
  when = '2026'

# Template:
#
# [[places]]
#   city = ''
#   country = ''
#   lat = 0.0
#   lon = 0.0
#   when = ''
